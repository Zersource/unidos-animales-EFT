<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Unidos por los Animales</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🐾 Unidos por los Animales</div>
    <div class="nav-links">
        <a th:href="@{/mascotas/catalogo}">Catalogo</a>
        <a th:href="@{/mascotas}">Mascotas</a>
        <a th:href="@{/solicitudes}">Solicitudes</a>
        <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/adoptantes}">Adoptantes</a>
        <span class="nav-user" sec:authentication="name"></span>
        <a th:href="@{/logout}" class="btn-logout">Cerrar sesion</a>
    </div>
</nav>
<div class="container">
    <h1 class="page-title">Panel de Control - Unidos por los Animales</h1>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalMascotas}">0</div>
            <div class="stat-label">Total Mascotas</div>
        </div>
        <div class="stat-card stat-green">
            <div class="stat-number" th:text="${disponibles}">0</div>
            <div class="stat-label">Disponibles</div>
        </div>
        <div class="stat-card stat-orange">
            <div class="stat-number" th:text="${pendientes}">0</div>
            <div class="stat-label">Solicitudes Pendientes</div>
        </div>
    </div>
    <div class="quick-actions">
        <h2>Acciones rapidas</h2>
        <div class="action-grid">
            <a th:href="@{/mascotas/catalogo}" class="action-card">Ver Catalogo de Mascotas</a>
            <a th:href="@{/solicitudes/nueva}" class="action-card">Nueva Solicitud de Adopcion</a>
            <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/mascotas/nueva}" class="action-card">Agregar Mascota</a>
            <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/solicitudes}" class="action-card">Gestionar Solicitudes</a>
        </div>
    </div>
</div>
</body>
</html>
