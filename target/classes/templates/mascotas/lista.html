<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Mascotas</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/mascotas/catalogo}">Catalogo</a>
        <a th:href="@{/solicitudes}">Solicitudes</a>
        <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/adoptantes}">Adoptantes</a>
        <a th:href="@{/logout}" class="btn-logout">Salir</a>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h1>Gestion de Mascotas</h1>
        <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/mascotas/nueva}" class="btn btn-primary">+ Nueva Mascota</a>
    </div>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <table class="tabla">
        <thead><tr><th>ID</th><th>Nombre</th><th>Especie</th><th>Raza</th><th>Edad</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:each="m : ${mascotas}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.nombre}"></td>
                <td th:text="${m.especie}"></td>
                <td th:text="${m.raza}"></td>
                <td th:text="${m.edad}"></td>
                <td th:text="${m.estado}"></td>
                <td>
                    <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')" th:href="@{/mascotas/editar/{id}(id=${m.id})}" class="btn btn-sm btn-secondary">Editar</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/mascotas/eliminar/{id}(id=${m.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
