<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Solicitudes</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/mascotas}">Mascotas</a><a th:href="@{/adoptantes}">Adoptantes</a><a th:href="@{/logout}" class="btn-logout">Salir</a></div>
</nav>
<div class="container">
    <div class="page-header">
        <h1>Solicitudes de Adopcion</h1>
        <a th:href="@{/solicitudes/nueva}" class="btn btn-primary">+ Nueva Solicitud</a>
    </div>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <table class="tabla">
        <thead><tr><th>ID</th><th>Fecha</th><th>Mascota</th><th>Adoptante</th><th>Estado</th><th>Coordinador</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:each="s : ${solicitudes}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.fecha}"></td>
                <td th:text="${s.mascota.nombre}"></td>
                <td th:text="${s.adoptante.nombre}"></td>
                <td><span th:text="${s.estado}" th:classappend="${s.estado == 'APROBADA'} ? 'badge-green' : (${s.estado == 'RECHAZADA'} ? 'badge-red' : 'badge-orange')"></span></td>
                <td th:text="${s.coordinadorUsername}"></td>
                <td>
                    <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')"
                       th:if="${s.estado == 'PENDIENTE'}"
                       th:href="@{/solicitudes/aprobar/{id}(id=${s.id})}" class="btn btn-sm btn-primary">Aprobar</a>
                    <a sec:authorize="hasAnyRole('ADMIN','COORDINADOR')"
                       th:if="${s.estado == 'PENDIENTE'}"
                       th:href="@{/solicitudes/rechazar/{id}(id=${s.id})}" class="btn btn-sm btn-danger">Rechazar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
