<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Nueva Solicitud</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/solicitudes}">Solicitudes</a><a th:href="@{/logout}" class="btn-logout">Salir</a></div>
</nav>
<div class="container">
    <h1>Nueva Solicitud de Adopcion</h1>
    <form th:action="@{/solicitudes/guardar}" method="post" class="formulario">
        <div class="form-group">
            <label>Mascota a adoptar</label>
            <select name="mascotaId" required>
                <option value="">Seleccionar mascota...</option>
                <option th:each="m : ${mascotas}" th:value="${m.id}" th:text="${m.nombre + ' (' + m.especie + ')'}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Adoptante</label>
            <select name="adoptanteId" required>
                <option value="">Seleccionar adoptante...</option>
                <option th:each="a : ${adoptantes}" th:value="${a.id}" th:text="${a.nombre + ' - ' + a.email}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Mensaje / Motivacion adicional</label>
            <textarea name="mensaje" rows="4" placeholder="Cuéntanos por que deseas adoptar esta mascota..."></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
            <a th:href="@{/solicitudes}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
