<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Unidos por los Animales</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-logo">🐾</div>
    <h1>Unidos por los Animales</h1>
    <p class="login-subtitle">Plataforma de Adopción</p>

    <div th:if="${param.error}" class="alert alert-error">
        Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
        Sesión cerrada correctamente.
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username"
                   placeholder="Ingresa tu usuario" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
    </form>

    <p class="login-public">
        <a th:href="@{/mascotas/catalogo}">Ver mascotas disponibles sin iniciar sesión →</a>
    </p>
</div>
</body>
</html>
