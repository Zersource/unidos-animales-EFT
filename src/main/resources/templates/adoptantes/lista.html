<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Adoptantes</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/mascotas}">Mascotas</a><a th:href="@{/solicitudes}">Solicitudes</a><a th:href="@{/logout}" class="btn-logout">Salir</a></div>
</nav>
<div class="container">
    <div class="page-header">
        <h1>Adoptantes Registrados</h1>
        <a th:href="@{/adoptantes/nuevo}" class="btn btn-primary">+ Nuevo Adoptante</a>
    </div>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <table class="tabla">
        <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Telefono</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:each="a : ${adoptantes}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.nombre}"></td>
                <td th:text="${a.email}"></td>
                <td th:text="${a.telefono}"></td>
                <td>
                    <a th:href="@{/adoptantes/editar/{id}(id=${a.id})}" class="btn btn-sm btn-secondary">Editar</a>
                    <a th:href="@{/adoptantes/eliminar/{id}(id=${a.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
