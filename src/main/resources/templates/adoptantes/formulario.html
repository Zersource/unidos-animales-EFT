<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Formulario Adoptante</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/adoptantes}">Adoptantes</a><a th:href="@{/logout}" class="btn-logout">Salir</a></div>
</nav>
<div class="container">
    <h1 th:text="${adoptante.id == null} ? 'Nuevo Adoptante' : 'Editar Adoptante'"></h1>
    <form th:action="@{/adoptantes/guardar}" th:object="${adoptante}" method="post" class="formulario">
        <input type="hidden" th:field="*{id}">
        <div class="form-group"><label>Nombre completo</label><input type="text" th:field="*{nombre}" required></div>
        <div class="form-group"><label>Email</label><input type="email" th:field="*{email}" required></div>
        <div class="form-group"><label>Telefono</label><input type="text" th:field="*{telefono}"></div>
        <div class="form-group"><label>Direccion</label><input type="text" th:field="*{direccion}"></div>
        <div class="form-group"><label>Motivacion para adoptar</label><textarea th:field="*{motivacion}" rows="4"></textarea></div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/adoptantes}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
