<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Catalogo</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
    <div class="nav-brand">Unidos por los Animales</div>
    <div class="nav-links"><a th:href="@{/login}">Ingresar al Sistema</a></div>
</nav>
<div class="container">
    <h1 class="page-title">Mascotas Disponibles para Adopcion</h1>
    <form th:action="@{/mascotas/catalogo}" method="get" class="search-form">
        <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar por nombre...">
        <button type="submit" class="btn btn-primary">Buscar</button>
        <a th:href="@{/mascotas/catalogo}" class="btn btn-secondary">Ver todas</a>
    </form>
    <div class="mascotas-grid">
        <div th:each="m : ${mascotas}" class="mascota-card">
            <h3 th:text="${m.nombre}"></h3>
            <p><strong>Especie:</strong> <span th:text="${m.especie}"></span></p>
            <p><strong>Raza:</strong> <span th:text="${m.raza}"></span></p>
            <p><strong>Edad:</strong> <span th:text="${m.edad}"></span> anios</p>
            <p th:text="${m.descripcion}"></p>
            <a th:href="@{/solicitudes/nueva}" class="btn btn-primary">Solicitar Adopcion</a>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(mascotas)}" class="empty-msg">No hay mascotas disponibles por el momento.</p>
</div>
</body>
</html>
